<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SBI Auto-Analyzer & PDF Generator</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <style>
        :root { --sbi-blue: #0077CC; --sbi-light: #e6f2ff; --text-dark: #333; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7f6; margin: 0; padding: 20px; color: var(--text-dark); }
        
        .main-container { max-width: 700px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .header { text-align: center; margin-bottom: 25px; }
        .header h2 { color: var(--sbi-blue); margin: 0; font-size: 24px; }
        
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; font-weight: 600; margin-bottom: 6px; font-size: 14px; color: #555; }
        .input-group input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 14px; outline: none; }
        .input-group input:focus { border-color: var(--sbi-blue); }
        
        .btn-run { width: 100%; background: var(--sbi-blue); color: white; border: none; padding: 14px; font-size: 16px; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 10px; box-shadow: 0 4px 10px rgba(0, 119, 204, 0.2); }
        .btn-run:hover { background: #005fa3; }
        
        /* PDF / Print Report UI */
        #printableReport { display: none; max-width: 800px; margin: 30px auto; border: 1px solid #ddd; padding: 30px; border-radius: 12px; background: white; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .report-header { text-align: center; border-bottom: 3px solid var(--sbi-blue); padding-bottom: 15px; margin-bottom: 20px; }
        .report-header h3 { margin: 0; color: var(--sbi-blue); font-size: 26px; text-transform: uppercase; letter-spacing: 1px; }
        .report-meta { display: flex; justify-content: space-between; font-size: 15px; color: #444; margin-bottom: 20px; background: #f9f9f9; padding: 15px; border-radius: 8px; border: 1px dashed #ccc; }
        
        table { width: 100%; border-collapse: collapse; font-size: 14px; margin-bottom: 20px; }
        th, td { border: 1px solid #eee; padding: 12px; text-align: left; }
        th { background-color: var(--sbi-light); color: var(--sbi-blue); font-weight: 600; text-transform: uppercase; font-size: 13px; }
        tr:nth-child(even) { background-color: #fafafa; }
        
        .summary-box { display: flex; justify-content: flex-end; gap: 30px; font-weight: bold; font-size: 18px; border-top: 2px solid #ddd; padding-top: 15px; }
        .credit-text { color: #28a745; }
        .debit-text { color: #dc3545; }
        
        .btn-print { background: #28a745; color: white; border: none; padding: 12px 24px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; margin-top: 20px; display: inline-block; box-shadow: 0 4px 10px rgba(40, 167, 69, 0.2); }
        
        /* CSS Trick to hide everything else and only print the Report */
        @media print {
            body { background: white; padding: 0; }
            .hide-on-print { display: none !important; }
            #printableReport { display: block !important; border: none; box-shadow: none; margin: 0; padding: 0; width: 100%; max-width: 100%; }
        }
    </style>
</head>
<body>

<div class="main-container hide-on-print">
    <div class="header">
        <h2>🏦 SBI Statement Auto-Filter</h2>
        <p style="color: gray; font-size: 13px; margin-top:5px;">Upload Excel -> Enter Name -> Get Clean PDF</p>
    </div>
    
    <div class="input-group">
        <label>1. Upload SBI Excel File (.xls, .xlsx, .csv)</label>
        <input type="file" id="fileInput" accept=".csv, .xls, .xlsx">
    </div>
    
    <div class="input-group">
        <label>2. Account Name / Target Keyword</label>
        <input type="text" id="keyword" placeholder="e.g. RAHUL KUMAR or UPI/RAMESH">
    </div>
    
    <div style="display: flex; gap: 15px;">
        <div class="input-group" style="flex: 1;">
            <label>Start Date (Optional)</label>
            <input type="date" id="startDate">
        </div>
        <div class="input-group" style="flex: 1;">
            <label>End Date (Optional)</label>
            <input type="date" id="endDate">
        </div>
    </div>
    
    <button class="btn-run" onclick="processSBIExcel()">⚡ Generate Statement PDF</button>
</div>

<div id="printableReport">
    <div class="report-header">
        <h3>Account Transaction Statement</h3>
        <p style="margin:5px 0 0 0; font-size:14px; color:gray;">System Generated Smart Ledger</p>
    </div>
    
    <div class="report-meta">
        <div><strong>👤 Searched Account:</strong> <span id="repKeyword" style="color:var(--sbi-blue); font-weight:bold;"></span></div>
        <div><strong>📅 Date Range:</strong> <span id="repDates" style="font-weight:bold;"></span></div>
    </div>
    
    <table id="reportTable">
        <thead>
            <tr>
                <th style="width: 15%;">Date</th>
                <th style="width: 50%;">Transaction Details (Narration)</th>
                <th style="text-align: right; width: 17%;">Paid Out (Debit)</th>
                <th style="text-align: right; width: 17%;">Received (Credit)</th>
            </tr>
        </thead>
        <tbody id="reportBody">
            </tbody>
    </table>
    
    <div class="summary-box">
        <div class="debit-text">Total Sent: ₹<span id="totDebit">0</span></div>
        <div class="credit-text">Total Received: ₹<span id="totCredit">0</span></div>
    </div>
    
    <div style="text-align: center;" class="hide-on-print">
        <button class="btn-print" onclick="window.print()">🖨️ Save as PDF / Print Now</button>
    </div>
</div>

<script>
    // Smart Date Parser (SBI ke ultay-seedhay date format ko handle karne ke liye)
    function parseBankDate(val) {
        if(!val) return null;
        if(!isNaN(val) && typeof val === 'number') return new Date(Math.round((val - 25569) * 86400 * 1000));
        let str = String(val).trim().split(' ')[0];
        let parts = str.split(/[-/]/);
        if(parts.length === 3) {
            let d = parseInt(parts[0]), m = parseInt(parts[1]) - 1, y = parseInt(parts[2]);
            if(y < 100) y += 2000;
            return new Date(y, m, d);
        }
        return new Date(val); 
    }

    function processSBIExcel() {
        const fileInput = document.getElementById('fileInput').files[0];
        const keyword = document.getElementById('keyword').value.trim().toLowerCase();
        const startStr = document.getElementById('startDate').value;
        const endStr = document.getElementById('endDate').value;

        if(!fileInput) { alert("⚠️ Please upload the SBI Excel File."); return; }
        if(!keyword) { alert("⚠️ Please enter the Account Name or Keyword."); return; }

        let startDate = startStr ? new Date(startStr).setHours(0,0,0,0) : null;
        let endDate = endStr ? new Date(endStr).setHours(23,59,59,999) : null;

        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, {type: 'array'});
                const worksheet = workbook.Sheets[workbook.SheetNames[0]];
                const jsonArr = XLSX.utils.sheet_to_json(worksheet, {header: 1});

                // 1. SBI Columns Auto-Detector
                let dCol = -1, descCol = -1, debCol = -1, credCol = -1, headerIndex = -1;
                
                for(let i=0; i<Math.min(jsonArr.length, 30); i++) {
                    let row = jsonArr[i];
                    if(!row || row.length === 0) continue;
                    
                    for(let c=0; c<row.length; c++) {
                        if(!row[c]) continue;
                        let val = String(row[c]).toLowerCase().trim();
                        
                        if(val.includes('txn date') || val === 'date' || val === 'value date') dCol = c;
                        else if(val.includes('description') || val.includes('narration') || val.includes('particulars')) descCol = c;
                        else if(val === 'debit') debCol = c;
                        else if(val === 'credit') credCol = c;
                    }
                    
                    // Agar Description aur koi ek Amount column mil gaya, matlab table shuru ho gayi
                    if(descCol !== -1 && (debCol !== -1 || credCol !== -1)) {
                        headerIndex = i;
                        break;
                    }
                }

                if(headerIndex === -1) {
                    alert("❌ Error: Could not detect correct columns. Please make sure this is an SBI Statement.");
                    return;
                }

                let tbody = document.getElementById('reportBody');
                tbody.innerHTML = '';
                let totalDebit = 0, totalCredit = 0;
                let count = 0;

                // 2. Data Filtering and Extraction
                for(let i = headerIndex + 1; i < jsonArr.length; i++) {
                    let row = jsonArr[i];
                    if(!row || row.length === 0 || !row[dCol]) continue; 

                    let rawDesc = row[descCol] ? String(row[descCol]).toLowerCase() : "";
                    
                    // Agar naam match karta hai
                    if(rawDesc.includes(keyword)) {
                        let parsedDate = parseBankDate(row[dCol]);
                        let time = parsedDate ? parsedDate.getTime() : null;

                        // Date check
                        if(startDate && time && time < startDate) continue;
                        if(endDate && time && time > endDate) continue;

                        let debitAmt = parseFloat(String(row[debCol] || 0).replace(/[^\d.-]/g, '')) || 0;
                        let creditAmt = parseFloat(String(row[credCol] || 0).replace(/[^\d.-]/g, '')) || 0;

                        if(debitAmt > 0 || creditAmt > 0) {
                            totalDebit += debitAmt;
                            totalCredit += creditAmt;
                            count++;

                            let fDate = parsedDate ? parsedDate.toLocaleDateString('en-IN') : String(row[dCol]);
                            let cleanDesc = String(row[descCol]);
                            
                            tbody.innerHTML += `
                                <tr>
                                    <td style="white-space:nowrap; font-weight:500;">${fDate}</td>
                                    <td style="color:#555;">${cleanDesc}</td>
                                    <td style="text-align: right; color: #dc3545; font-weight:600;">${debitAmt > 0 ? '₹'+debitAmt.toLocaleString('en-IN') : '-'}</td>
                                    <td style="text-align: right; color: #28a745; font-weight:600;">${creditAmt > 0 ? '₹'+creditAmt.toLocaleString('en-IN') : '-'}</td>
                                </tr>
                            `;
                        }
                    }
                }

                if(count === 0) {
                    tbody.innerHTML = `<tr><td colspan="4" style="text-align:center; padding:20px; color:gray;">No transactions found for "${keyword.toUpperCase()}" in this period.</td></tr>`;
                }

                // 3. UI Update for PDF Rendering
                document.getElementById('repKeyword').innerText = keyword.toUpperCase();
                
                let rangeText = "All Time";
                if(startStr || endStr) {
                    rangeText = (startStr ? new Date(startStr).toLocaleDateString('en-IN') : 'Start') + " to " + 
                                (endStr ? new Date(endStr).toLocaleDateString('en-IN') : 'End');
                }
                document.getElementById('repDates').innerText = rangeText;
                
                document.getElementById('totDebit').innerText = totalDebit.toLocaleString('en-IN');
                document.getElementById('totCredit').innerText = totalCredit.toLocaleString('en-IN');

                // Display the printable report on screen
                let reportDiv = document.getElementById('printableReport');
                reportDiv.style.display = 'block';
                
                // Scroll page down smoothly to the report
                reportDiv.scrollIntoView({ behavior: 'smooth', block: 'start' });

            } catch(e) {
                alert("❌ Error processing Excel file. Make sure it is not corrupted.");
                console.error(e);
            }
        };
        reader.readAsArrayBuffer(fileInput);
    }
</script>
</body>
</html>
